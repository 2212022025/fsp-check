<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web FPS Game</title>
    <link rel="stylesheet" href="./styles/style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js"
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>
    <div id="landscape-warning">Please rotate your device to Landscape Mode</div>

    <div id="start-screen">
        <h1 style="margin-bottom: 20px;">My FPS Game</h1>
        <button id="btn-start" style="display: none;">START GAME</button>
        <p id="loading-text">Loading Assets... Please wait</p>
    </div>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div id="joystick-zone"></div>
        <div id="look-zone"></div>
        <div id="action-buttons">
            <button id="btn-fire">🔥</button>
            <button id="btn-jump">⬆️</button>
        </div>
    </div>

    <script type="module" src="./control.js"></script>
</body>
</html>
